  mmx.fillStyle='#FF0';mmx.beginPath();mmx.arc(G.player.x*sx,G.player.y*sy,3,0,Math.PI*2);mmx.fill();mmx.strokeStyle='#000';mmx.lineWidth=1;mmx.stroke();
}

// ======================================================
// GAME LOOP
// ======================================================
let lastTime=0;

function gameLoop(ts){
  if(!G.running)return;
  const dt=Math.min(ts-lastTime,50);lastTime=ts;G.rt+=dt;
  if(!G.paused){
    update(dt);Shake.update(dt);DayNight.update(dt);
    drawWorld();mmT++;if(mmT%5===0)drawMinimap();
    updateHUD();G.animFrame++;
    G.comboTimer=Math.max(0,G.comboTimer-dt);if(G.comboTimer===0)G.combo=0;
    // Music mood
    if(G.waterLevel<25)Audio.setMood('danger');
    else if(G.combo>2)Audio.setMood('busy');
    else if(DayNight.time>0.7||DayNight.time<0.1)Audio.setMood('night');
    else Audio.setMood('calm');
  }
  requestAnimationFrame(gameLoop);
}

function update(dt){
  const dtF=dt/16.67,spd=(G.vehicle==='walk'?2.8:4.5)*dtF;
  if(G.keys.up)G.player.vy=lerp(G.player.vy,-spd,0.3);else if(G.keys.down)G.player.vy=lerp(G.player.vy,spd,0.3);else G.player.vy*=0.85;
  if(G.keys.left)G.player.vx=lerp(G.player.vx,-spd,0.3);else if(G.keys.right)G.player.vx=lerp(G.player.vx,spd,0.3);else G.player.vx*=0.85;
  G.player.x+=G.player.vx;G.player.y+=G.player.vy;
  G.player.x=Math.max(20,Math.min(WW-20,G.player.x));G.player.y=Math.max(20,Math.min(WH-20,G.player.y));
  const tcx=G.player.x-canvas.width/2,tcy=G.player.y-canvas.height/2;
  G.camera.x=lerp(G.camera.x,tcx,0.08*dtF);G.camera.y=lerp(G.camera.y,tcy,0.08*dtF);
  G.camera.x=Math.max(0,Math.min(WW-canvas.width,G.camera.x));G.camera.y=Math.max(0,Math.min(WH-canvas.height,G.camera.y));

  // Exhaust
  const mv=G.keys.up||G.keys.down||G.keys.left||G.keys.right;
  if(mv&&G.vehicle!=='walk'){G.dustT+=dt;if(G.dustT>150){G.dustT=0;G.exhaust.push({x:G.player.x+(Math.random()-0.5)*10,y:G.player.y+20,size:4+Math.random()*4,life:1});}}
  G.exhaust.forEach(p=>{p.life-=dt*0.002;p.size+=dt*0.01;p.y-=dt*0.01;});
  G.exhaust=G.exhaust.filter(p=>p.life>0);

  // Collect
  const PD=G.vehicle==='walk'?35:55;
  if(G.vehicle==='garbage'||G.vehicle==='walk')G.trashItems.forEach(i=>{if(!i.collected&&dist(G.player,i)<PD)autoCollect(i,'trash');});
  if(G.vehicle==='recycle'||G.vehicle==='walk')G.recycleItems.forEach(i=>{if(!i.collected&&dist(G.player,i)<PD)autoCollect(i,'recycle');});

  // Treasure pickup
  G.treasures.forEach(t=>{if(!t.found&&dist(G.player,t)<50){t.found=true;G.treasuresFound++;G.score+=100;notify('Treasure! +100pts');Audio.play('treasure');Shake.add(0.4);Particles.emit(canvas.width/2,canvas.height/2,t.type,10,80);earnBadge('treasure_1');if(G.treasuresFound>=5)earnBadge('treasure_5');}});

  // Water/Clean
  const uf=[...G.brokenPipes,...G.brokenDams,...G.brokenHydrants].filter(b=>!b.fixed).length;
  G.waterLevel=Math.max(0,Math.min(100,G.waterLevel-uf*0.003*dtF+0.01*dtF));
  const uc=G.trashItems.filter(t=>!t.collected).length+G.recycleItems.filter(r=>!r.collected).length;
  G.cleanLevel=Math.max(0,100-uc*2);

  // Update yetis
  updateYetis(dt);

  checkMissions();
  if(G.waterLevel>=80)earnBadge('no_flood');
  if(G.score>=100)earnBadge('score_100');
  if(G.score>=500)earnBadge('score_500');
  if(G.score>=1000)earnBadge('score_1000');
  if(G.usedVehicles.size>=4)earnBadge('all_vehicles');
  if(G.combo>=3)earnBadge('combo_3');
  if(G.yetisTalked.size>=5)earnBadge('yeti_friend');
  if(G.yetisHelped>=3)earnBadge('yeti_helper');
  if(G.score>G.highScore){G.highScore=G.score;localStorage.setItem('ccc_hi',G.highScore);}
}

function autoCollect(item,type){
  item.collected=true;G.combo++;G.comboTimer=2500;
  const pts=10*G.combo;G.score+=pts;
  const sx=item.x-G.camera.x,sy=item.y-G.camera.y;
  Particles.emit(sx,sy,type==='trash'?'🗑️':'♻️',5+G.combo,50);
  notify(`+${pts}${G.combo>1?' '+G.combo+'x!':''}`);
  Audio.play(type==='trash'?'pickup':'recycle');
  if(G.combo>1)Audio.play('combo');Shake.add(0.1+G.combo*0.03);
  if(type==='trash')earnBadge('first_trash');if(type==='recycle')earnBadge('first_recycle');
  // Nearby yetis cheer
  G.yetis.forEach(y=>{if(dist(item,y)<120){y.mood='cheering';y.moodTimer=2000;Audio.play('yeti_happy');}});
  setTimeout(()=>{item.collected=false;item.x=50+Math.random()*(WW-100);item.y=50+Math.random()*(WH-100);},12000);
}

function doAction(){
  Audio.play('click');
  // Check yeti interaction first
  const nearYeti=G.yetis.find(y=>dist(G.player,y)<80);
  if(nearYeti){
    if(!G.yetisTalked.has(nearYeti.id)){
      G.yetisTalked.add(nearYeti.id);nearYeti.talked=true;
      nearYeti.mood='cheering';nearYeti.moodTimer=3000;
      G.score+=15;
      Audio.play(nearYeti.type==='child'?'yeti_child':'yeti_wave');
      const msgs=['Hi friend!','Thanks for cleaning!','You\'re the best!','Yay clean city!','Hello!','Keep going!'];
      notify(msgs[Math.floor(Math.random()*msgs.length)]+' +15pts');
      Shake.add(0.1);
      if(nearYeti.hasRequest){G.yetisHelped++;nearYeti.hasRequest=false;G.score+=25;Audio.play('yeti_cheer');notify('Helped a yeti! +25pts');}
    } else {
      nearYeti.mood='waving';nearYeti.moodTimer=1500;
      Audio.play('yeti_wave');
      notify('Hey again!');
    }
    return;
  }
  // Repair
  const broken=[...G.brokenPipes,...G.brokenDams,...G.brokenHydrants].filter(b=>!b.fixed);
  const near=broken.find(b=>dist(G.player,b)<80);
  if(near&&G.vehicle==='repair'){
    near.fixed=true;G.score+=30;G.combo++;G.comboTimer=2500;
    Particles.emit(canvas.width/2,canvas.height/2,'🔧',8,70);
    Particles.emit(canvas.width/2,canvas.height/2,'✨',5,40);
    notify('Fixed! +30pts');Audio.play('fix');Shake.add(0.3);earnBadge('first_repair');
    G.yetis.forEach(y=>{if(dist(near,y)<120){y.mood='cheering';y.moodTimer=2000;}});
    setTimeout(()=>{near.fixed=false;near.x=50+Math.random()*(WW-100);near.y=50+Math.random()*(WH-100);},18000);
  } else if(near){notify('Switch to Repair Van!');Audio.play('error');}
  else{notify('Nothing nearby! Keep exploring!');}
}

// ======================================================
// HUD / VEHICLES / NOTIFICATIONS / BADGES
// ======================================================
function updateHUD(){
  document.getElementById('scoreDisplay').textContent=G.score;
  document.getElementById('starsDisplay').textContent=['','⭐','⭐⭐','⭐⭐⭐'][G.stars]||'';
  document.getElementById('waterMeter').style.width=G.waterLevel+'%';
  document.getElementById('trashMeter').style.width=G.cleanLevel+'%';
  document.getElementById('waterPanel').classList.toggle('warning',G.waterLevel<25);
  document.getElementById('trashPanel').classList.toggle('warning',G.cleanLevel<20);
  const wf=document.getElementById('waterMeter');
  wf.style.background=G.waterLevel<25?'linear-gradient(90deg,#DC143C,#FF6347)':G.waterLevel<50?'linear-gradient(90deg,#FFA500,#FFD700)':'linear-gradient(90deg,#1E90FF,#00CED1)';
}

function switchVehicle(v){
  G.vehicle=v;G.usedVehicles.add(v);
  ['garbage','recycle','repair','walk'].forEach(t=>document.getElementById('vbtn-'+t).classList.toggle('active',t===v));
  notify({garbage:'Garbage Truck',recycle:'Recycle Truck',repair:'Repair Van',walk:'Walking'}[v]+'!');Audio.play('switch');
}

let notifT=null;
function notify(text){const el=document.getElementById('notification');el.textContent=text;el.classList.add('show');clearTimeout(notifT);notifT=setTimeout(()=>el.classList.remove('show'),1400);}

function earnBadge(id){
  if(G.badges.has(id))return;G.badges.add(id);localStorage.setItem('ccc_badges',JSON.stringify([...G.badges]));
  const d=BADGES.find(b=>b.id===id);if(!d)return;
  document.getElementById('badgeEmoji').textContent=d.emoji;document.getElementById('badgeTitle').textContent=d.title;document.getElementById('badgeDesc').textContent=d.desc;
  document.getElementById('badge-popup').classList.add('show');Audio.play('badge');Shake.add(0.4);
}
function closeBadgePopup(){document.getElementById('badge-popup').classList.remove('show');Audio.play('click');}

function showScreen(id){
  stopCharPreview();
  document.querySelectorAll('.screen').forEach(s=>{if(s.classList.contains('active')){s.style.opacity='0';setTimeout(()=>{s.classList.remove('active');s.style.opacity='';},300);}});
  setTimeout(()=>{const t=document.getElementById(id);t.classList.add('active');t.style.opacity='0';requestAnimationFrame(()=>{t.style.opacity='1';});},300);
}
function doPlay(){
  var nameVal=document.getElementById('playerNameInput').value.trim();
  if(!nameVal){document.getElementById('playerNameInput').focus();document.getElementById('playerNameInput').style.borderColor='#DC143C';setTimeout(function(){document.getElementById('playerNameInput').style.borderColor='#8B6914';},1500);return;}
  P.name=nameVal;
  localStorage.setItem('ccc_name',nameVal);
  Audio.play('click');
  showCharSelect();
}
function showCharSelect(){stopCharPreview();showScreen('char-screen');buildCharUI();
  var lbl=document.getElementById('charNameLabel');if(lbl)lbl.textContent=P.name;
  setTimeout(drawCharPreview,350);}
function showBadges(){
  Audio.play('click');showScreen('badges-screen');
  const grid=document.getElementById('badgesGrid');grid.innerHTML='';
  BADGES.forEach(b=>{const e=G.badges.has(b.id);grid.innerHTML+=`<div style="background:${e?'linear-gradient(180deg,#FFD700,#FFA500)':'#D4C08A'};border:3px solid #8B6914;border-radius:14px;padding:10px 14px;text-align:center;width:100px;box-shadow:0 3px 0 rgba(0,0,0,0.2);opacity:${e?1:0.5}"><div style="font-size:28px">${b.emoji}</div><div style="font-family:'Fredoka One';font-size:10px;color:#5C3D00;margin-top:3px">${b.title}</div><div style="font-size:8px;color:#8B6914;margin-top:2px">${e?b.desc:'???'}</div></div>`;});
}

// ======================================================
// TUTORIAL
// ======================================================
const TUT=[
  {icon:'🚛',text:'Welcome to City Clean Crew! The YaYa Yetis need your help keeping their city clean!'},
  {icon:'◄►▲▼',text:'Use the D-pad or tap the screen to move around.'},
  {icon:'🗑️♻️',text:'Drive near trash and recycling to auto-collect!'},
  {icon:'🔧',text:'Switch to Repair Van and press DO IT near broken pipes.'},
  {icon:'❄️',text:'Talk to YaYa Yetis! Press DO IT near them. Some need your help!'},
  {icon:'💎',text:'Find hidden treasures around the city for bonus points!'},
  {icon:'⭐',text:'Complete missions, earn badges, and have fun!'},
];
let tutStep=0;
function showTutorial(){if(!G.firstPlay)return;tutStep=0;showTutStep();}
function showTutStep(){
  if(tutStep>=TUT.length){document.getElementById('tutorial-overlay').classList.remove('active');G.paused=false;localStorage.setItem('ccc_played','true');G.firstPlay=false;return;}
  const s=TUT[tutStep];document.getElementById('tutorialIcon').textContent=s.icon;document.getElementById('tutorialText').textContent=s.text;
  document.getElementById('tutorial-overlay').classList.add('active');G.paused=true;
  document.getElementById('tutorialBtn').onclick=()=>{Audio.play('click');tutStep++;showTutStep();};
}

// ======================================================
// INPUT
// ======================================================
function setupInput(){
  const map={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',KeyW:'up',KeyS:'down',KeyA:'left',KeyD:'right'};
  addEventListener('keydown',e=>{if(map[e.code]){G.keys[map[e.code]]=true;e.preventDefault();}if(e.code==='Space'){doAction();e.preventDefault();}});
  addEventListener('keyup',e=>{if(map[e.code])G.keys[map[e.code]]=false;});
  function hold(dir){const el=document.getElementById('dpad-'+dir);el.addEventListener('touchstart',e=>{e.preventDefault();G.keys[dir]=true;},{passive:false});el.addEventListener('touchend',e=>{e.preventDefault();G.keys[dir]=false;},{passive:false});el.addEventListener('mousedown',()=>G.keys[dir]=true);el.addEventListener('mouseup',()=>G.keys[dir]=false);el.addEventListener('mouseleave',()=>G.keys[dir]=false);}
  hold('up');hold('down');hold('left');hold('right');
  canvas.addEventListener('touchstart',e=>{e.preventDefault();Audio.resume();handleTouch(e.touches[0]);},{passive:false});
  canvas.addEventListener('touchmove',e=>{e.preventDefault();handleTouch(e.touches[0]);},{passive:false});
  canvas.addEventListener('touchend',()=>{G.keys={up:false,down:false,left:false,right:false};},{passive:false});
  document.addEventListener('click',()=>Audio.resume(),{once:true});
}
function handleTouch(t){const dx=t.clientX-canvas.getBoundingClientRect().left-canvas.width/2,dy=t.clientY-canvas.getBoundingClientRect().top-canvas.height/2,dz=Math.min(50,canvas.width*0.08);G.keys.up=dy<-dz;G.keys.down=dy>dz;G.keys.left=dx<-dz;G.keys.right=dx>dz;}

function togglePause(){G.paused=!G.paused;if(G.paused)notify('Paused!');Audio.play('click');}
function toggleSound(){G.soundOn=!G.soundOn;Audio.enabled=G.soundOn;if(G.soundOn)Audio.startMusic();else Audio.stopMusic();Audio.play('click');}

// ======================================================
// START
// ======================================================
function startGame(){
  Audio.init();Audio.play('click');
  if(!P.name||P.name==='Hero')P.name=localStorage.getItem('ccc_name')||'Hero';
  G.score=0;G.stars=0;G.combo=0;G.comboTimer=0;G.waterLevel=80;G.cleanLevel=30;
  G.usedVehicles=new Set(['garbage']);G.vehicle='garbage';
  G.player={x:400,y:400,vx:0,vy:0};G.camera={x:400-canvas.width/2,y:400-canvas.height/2};
  G.keys={up:false,down:false,left:false,right:false};G.paused=false;
  G.exhaust=[];G.dustT=0;G.rt=0;G.running=false;
  G.yetisTalked=new Set();G.yetisHelped=0;G.treasuresFound=0;
  DayNight.init();genWorld();showScreen('game-screen');resize();setupInput();
  ['garbage','recycle','repair','walk'].forEach(t=>document.getElementById('vbtn-'+t).classList.toggle('active',t==='garbage'));
  G.running=true;lastTime=performance.now();requestAnimationFrame(gameLoop);
  Audio.startMusic();notify(`Welcome, ${P.name}!`);
  setTimeout(()=>showTutorial(),1500);
}

// ======================================================
// CLOUDS
// ======================================================
// CLOUDS + INIT
// ======================================================
(function(){
  // Clouds
  var cc=document.getElementById('titleClouds');
  for(var i=0;i<6;i++){var cl=document.createElement('div');cl.className='cloud';cl.style.cssText='width:'+(80+Math.random()*120)+'px;height:'+(30+Math.random()*30)+'px;top:'+(Math.random()*80)+'%;animation-duration:'+(20+Math.random()*30)+'s;animation-delay:'+(-Math.random()*30)+'s;';cc.appendChild(cl);}
  // Load saved name
  var savedName=localStorage.getItem('ccc_name');
  var nameInput=document.getElementById('playerNameInput');
  var welcome=document.getElementById('title-welcome');
  if(savedName){
    nameInput.value=savedName;
    welcome.style.display='block';
    welcome.textContent='Welcome back, '+savedName+'!';
  }
  // Update welcome on name input change
  nameInput.addEventListener('input',function(){
    var v=nameInput.value.trim();
    if(v){welcome.style.display='block';welcome.textContent='Hey there, '+v+'!';}
    else{welcome.style.display='none';}
  });
  // Allow Enter key to play
  nameInput.addEventListener('keydown',function(e){if(e.key==='Enter')doPlay();});
})();
</script>
